substitutions:
  device_name: "veranda-lightswitch"
  friendly_name: "Veranda lightswitch"

packages:
  base: !include .base.shelly1gen2.yaml
  #esphome.bluetooth-proxy: github://esphome/bluetooth-proxies/m5stack-atom-lite.yaml@main

binary_sensor:
  - platform: gpio
    name: Switch
    pin: GPIO4
    filters:
      - delayed_on_off: 30ms
    on_multi_click:
      - timing:
          - ON for at least 2s
          - OFF for at most 1s
          - ON for at least 40ms
          - OFF for at most 1s
          - ON for at least 40ms
          - OFF for at most 1s
          - ON for at least 3s
        then:
          - homeassistant.event:
              event: esphome.veranda_lightswitch_button
              data:
                event_type: garage_open
      - timing:
          - ON for at most 1s
          - OFF for at least 0.5s
        then:
          - if:
              condition:
                api.connected:
              then:
                - homeassistant.event:
                    event: esphome.veranda_lightswitch_button
                    data:
                      event_type: single
              else:
                - switch.toggle: relay

  - platform: ble_presence
    mac_address: "6A:6A:B7:68:E6:92"
    name: mobile_dam_s22_presence

button:
  - platform: template
    name: Button single
    on_press:
      then:
        - homeassistant.event:
            event: esphome.veranda_lightswitch_button
            data:
              event_type: single


